<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="Segoe UI, Malgun Gothic, sans-serif" role="img" aria-label="컨테이너 기반 앱 현대화 및 DevOps 아키텍처 다이어그램">
  <defs>
    <linearGradient id="azure" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0067b8"/>
      <stop offset="1" stop-color="#00b7c3"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#605e5c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="400" fill="#f5f7fa" rx="12"/>

  <!-- Dev -->
  <g>
    <rect x="24" y="150" width="140" height="100" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="94" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">개발자</text>
    <text x="94" y="208" text-anchor="middle" font-size="11" fill="#484644">코드 · 커밋</text>
    <text x="94" y="226" text-anchor="middle" font-size="11" fill="#484644">GitHub</text>
  </g>

  <line x1="170" y1="200" x2="212" y2="200" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- CI/CD -->
  <g>
    <rect x="220" y="150" width="160" height="100" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="300" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">CI/CD</text>
    <text x="300" y="204" text-anchor="middle" font-size="11" fill="#484644">GitHub Actions</text>
    <text x="300" y="222" text-anchor="middle" font-size="11" fill="#484644">빌드 · 테스트 · 배포</text>
  </g>

  <line x1="386" y1="200" x2="428" y2="200" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ACR -->
  <g>
    <rect x="436" y="60" width="150" height="70" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="511" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">Container</text>
    <text x="511" y="110" text-anchor="middle" font-size="11" fill="#484644">Registry (ACR)</text>
  </g>
  <line x1="380" y1="180" x2="470" y2="132" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Runtime -->
  <g>
    <rect x="436" y="150" width="300" height="180" rx="14" fill="#eef6fb" stroke="#0067b8" stroke-dasharray="4 4"/>
    <text x="586" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#0067b8">컨테이너 런타임</text>

    <rect x="456" y="196" width="130" height="60" rx="10" fill="url(#azure)"/>
    <text x="521" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">AKS</text>
    <text x="521" y="240" text-anchor="middle" font-size="10" fill="#eaf6ff">대규모 · 유연</text>

    <rect x="596" y="196" width="122" height="60" rx="10" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="657" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#1b1a19">Container Apps</text>
    <text x="657" y="240" text-anchor="middle" font-size="10" fill="#484644">서버리스</text>

    <rect x="456" y="270" width="262" height="44" rx="10" fill="#eef1f5" stroke="#c8c6c4"/>
    <text x="587" y="297" text-anchor="middle" font-size="11" fill="#484644">Dapr · KEDA · 마이크로서비스 · 오토스케일</text>
  </g>
  <line x1="511" y1="130" x2="511" y2="192" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Managed services -->
  <g>
    <rect x="762" y="150" width="130" height="180" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="827" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#1b1a19">관리형 서비스</text>
    <text x="827" y="204" text-anchor="middle" font-size="11" fill="#484644">Azure DB</text>
    <text x="827" y="224" text-anchor="middle" font-size="11" fill="#484644">Key Vault</text>
    <text x="827" y="244" text-anchor="middle" font-size="11" fill="#484644">Monitor</text>
    <text x="827" y="264" text-anchor="middle" font-size="11" fill="#484644">Service Bus</text>
  </g>
  <line x1="740" y1="230" x2="758" y2="230" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <text x="460" y="366" text-anchor="middle" font-size="12" fill="#605e5c">코드 커밋 → 자동 빌드/테스트 → 이미지 푸시 → 컨테이너 런타임 배포 → 관리형 서비스 연동</text>
</svg>
