<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="Segoe UI, Malgun Gothic, sans-serif" role="img" aria-label="Zero Trust 보안 아키텍처 다이어그램">
  <defs>
    <linearGradient id="azure" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0067b8"/>
      <stop offset="1" stop-color="#00b7c3"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#605e5c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="400" fill="#f5f7fa" rx="12"/>

  <!-- Identities / Devices -->
  <g>
    <rect x="30" y="150" width="160" height="100" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="110" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1b1a19">사용자 · 디바이스</text>
    <text x="110" y="210" text-anchor="middle" font-size="12" fill="#484644">어디서나 접속</text>
    <text x="110" y="228" text-anchor="middle" font-size="12" fill="#484644">BYOD · 원격</text>
  </g>

  <line x1="196" y1="200" x2="272" y2="200" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Entra ID policy engine -->
  <g>
    <rect x="280" y="130" width="200" height="140" rx="12" fill="url(#azure)"/>
    <text x="380" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Microsoft Entra ID</text>
    <text x="380" y="186" text-anchor="middle" font-size="12" fill="#eaf6ff">조건부 액세스</text>
    <text x="380" y="206" text-anchor="middle" font-size="12" fill="#eaf6ff">MFA · PIM</text>
    <text x="380" y="226" text-anchor="middle" font-size="12" fill="#eaf6ff">"명시적 확인"</text>
    <text x="380" y="250" text-anchor="middle" font-size="11" fill="#eaf6ff">정책 결정 지점(PDP)</text>
  </g>

  <line x1="486" y1="200" x2="562" y2="200" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Protected resources -->
  <g>
    <rect x="570" y="70" width="320" height="70" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="730" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">앱 · 데이터 · 인프라</text>
    <text x="730" y="122" text-anchor="middle" font-size="12" fill="#484644">Microsoft 365 · Azure · SaaS</text>

    <rect x="570" y="155" width="155" height="90" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="647" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">Defender</text>
    <text x="647" y="207" text-anchor="middle" font-size="11" fill="#484644">for Cloud · XDR</text>
    <text x="647" y="225" text-anchor="middle" font-size="11" fill="#484644">위협 보호</text>

    <rect x="735" y="155" width="155" height="90" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="812" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">Sentinel</text>
    <text x="812" y="207" text-anchor="middle" font-size="11" fill="#484644">SIEM · SOAR</text>
    <text x="812" y="225" text-anchor="middle" font-size="11" fill="#484644">통합 관제</text>
  </g>

  <!-- Governance bar -->
  <g>
    <rect x="280" y="300" width="610" height="60" rx="12" fill="#eef1f5" stroke="#c8c6c4"/>
    <text x="585" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">거버넌스: Azure Policy · Management Group · Landing Zone</text>
    <text x="585" y="346" text-anchor="middle" font-size="11" fill="#484644">규정 준수 · 명명/태그 규칙 · 최소 권한(RBAC)</text>
  </g>
</svg>
