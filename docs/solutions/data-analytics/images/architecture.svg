<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="Segoe UI, Malgun Gothic, sans-serif" role="img" aria-label="Microsoft Fabric 메달리온 데이터 아키텍처 다이어그램">
  <defs>
    <linearGradient id="azure" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0067b8"/>
      <stop offset="1" stop-color="#00b7c3"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#605e5c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="400" fill="#f5f7fa" rx="12"/>

  <!-- Sources -->
  <g>
    <rect x="24" y="140" width="140" height="120" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="94" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">데이터 원본</text>
    <text x="94" y="192" text-anchor="middle" font-size="11" fill="#484644">DB · SaaS</text>
    <text x="94" y="212" text-anchor="middle" font-size="11" fill="#484644">IoT · 파일</text>
    <text x="94" y="232" text-anchor="middle" font-size="11" fill="#484644">스트리밍</text>
  </g>

  <line x1="170" y1="200" x2="212" y2="200" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Medallion in OneLake -->
  <g>
    <rect x="220" y="90" width="470" height="230" rx="14" fill="#eef6fb" stroke="#0067b8" stroke-dasharray="4 4"/>
    <text x="455" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#0067b8">Microsoft Fabric · OneLake (Delta / Parquet)</text>

    <rect x="240" y="140" width="130" height="150" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="305" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#9a6a00">Bronze</text>
    <text x="305" y="190" text-anchor="middle" font-size="11" fill="#484644">원천 그대로</text>
    <text x="305" y="208" text-anchor="middle" font-size="11" fill="#484644">수집(Raw)</text>

    <rect x="390" y="140" width="130" height="150" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="455" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#7a7a7a">Silver</text>
    <text x="455" y="190" text-anchor="middle" font-size="11" fill="#484644">정제 · 표준화</text>
    <text x="455" y="208" text-anchor="middle" font-size="11" fill="#484644">검증</text>

    <rect x="540" y="140" width="130" height="150" rx="12" fill="url(#azure)"/>
    <text x="605" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Gold</text>
    <text x="605" y="190" text-anchor="middle" font-size="11" fill="#eaf6ff">집계 · 비즈니스</text>
    <text x="605" y="208" text-anchor="middle" font-size="11" fill="#eaf6ff">모델</text>

    <line x1="372" y1="215" x2="388" y2="215" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="522" y1="215" x2="538" y2="215" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <line x1="692" y1="200" x2="734" y2="200" stroke="#605e5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Consumption -->
  <g>
    <rect x="742" y="140" width="150" height="120" rx="12" fill="#ffffff" stroke="#c8c6c4"/>
    <text x="817" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#1b1a19">Power BI</text>
    <text x="817" y="192" text-anchor="middle" font-size="11" fill="#484644">Direct Lake</text>
    <text x="817" y="212" text-anchor="middle" font-size="11" fill="#484644">AI · Copilot</text>
    <text x="817" y="232" text-anchor="middle" font-size="11" fill="#484644">분석</text>
  </g>

  <text x="460" y="360" text-anchor="middle" font-size="12" fill="#605e5c">하나의 OneLake에 저장 · 엔진(Warehouse/Lakehouse/Real-Time/Power BI)이 동일 데이터를 공유</text>
</svg>
